<body class="font-inter bg-gray-50 text-gray-800 min-h-screen">
  <div class="container mx-auto px-4 pb-16">
    <!-- 导航 -->
    <nav class="flex justify-between items-center py-6 mb-10 border-b border-gray-200">
      <div>
        <a href="https://CoderLambert.github.io/learning-workshops/" class="nav-logo" style="margin-right: 8px; opacity: 0.8; transition: opacity 0.2s;" title="返回学习工坊首页">🏠</a><a href="#" class="nav-logo">🤖 Claude Code 最佳实践</a>
      </div>
      <ul class="flex gap-8">
        <li><a href="./index.html" class="text-gray-600 hover:text-primary transition-colors">首页</a></li>
        <li><a href="./learn.html" class="text-primary font-medium">学习</a></li>
        <li><a href="./flashcard.html" class="text-gray-600 hover:text-primary transition-colors">闪卡</a></li>
        <li><a href="./progress.html" class="text-gray-600 hover:text-primary transition-colors">进度</a></li>
      </ul>
    </nav>

    <!-- 页面标题 -->
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold mb-3">📚 Claude Code 知识点大全</h1>
      <p class="text-gray-600 max-w-2xl mx-auto">10个核心知识点，从零开始系统学习Claude Code，提升你的开发效率</p>
    </div>

    <!-- 搜索框 -->
    <div class="max-w-md mx-auto mb-8">
      <div class="relative">
        <input type="text" id="search-input" placeholder="🔍 搜索知识点，比如：@workspace" class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="flex flex-wrap gap-2 justify-center mb-8">
      <button class="filter-btn btn btn-sm bg-primary/10 text-primary px-3 py-1 rounded-full" data-filter="all">全部</button>
      <button class="filter-btn btn btn-sm bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded-full" data-filter="fav">⭐ 我的收藏</button>
      <button class="filter-btn btn btn-sm bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded-full" data-filter="learned">✅ 已学习</button>
      <button class="filter-btn btn btn-sm bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded-full" data-filter="easy">⭐ 入门级</button>
      <button class="filter-btn btn btn-sm bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded-full" data-filter="advanced">⭐⭐ 进阶</button>
    </div>

    <!-- 知识点卡片列表 -->
    <div id="knowledge-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
      <!-- 知识点卡片会动态生成 -->
    </div>
  </div>

  <script src="./js/wordData.js"></script>
  <script src="./js/storage.js"></script>
  <script>
    // 转换数据格式，兼容原有逻辑
    window.knowledgeList = window.WordRoots.map(item => ({
      id: item.id,
      title: item.root,
      icon: '🤖',
      description: item.description,
      tags: [item.origin],
      difficulty: item.difficulty,
      duration: item.duration
    }));

    // 搜索功能
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.trim().toLowerCase();
      filterKnowledge('search', keyword);
    });

    // 筛选功能
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // 点击筛选的时候清空搜索框
        searchInput.value = '';
        const filter = btn.getAttribute('data-filter');
        filterKnowledge('filter', filter);
        
        // 更新按钮选中状态
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('bg-primary/10', 'text-primary');
          b.classList.add('bg-gray-100', 'text-gray-700');
        });
        btn.classList.remove('bg-gray-100', 'text-gray-700');
        btn.classList.add('bg-primary/10', 'text-primary');
      });
    });

    // 收藏功能
    function toggleFavorite(id) {
      let favorites = JSON.parse(localStorage.getItem('cl_collection') || '[]');
      const btn = document.getElementById(`fav-btn-${id}`);
      if (favorites.includes(id)) {
        favorites = favorites.filter(item => item !== id);
        btn.innerHTML = '<i class="fa fa-star-o"></i> 收藏';
        btn.classList.remove('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
      } else {
        favorites.push(id);
        btn.innerHTML = '<i class="fa fa-star text-yellow-500"></i> 已收藏';
        btn.classList.add('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
      }
      localStorage.setItem('cl_collection', JSON.stringify(favorites));
    }

    // 页面加载时渲染知识点
    document.addEventListener('DOMContentLoaded', () => {
      renderKnowledgeList();
      // 初始化收藏状态
      const favorites = JSON.parse(localStorage.getItem('cl_collection') || '[]');
      // 初始化已学习状态
      const learned = JSON.parse(localStorage.getItem('cl_learned') || '[]');
      favorites.forEach(id => {
        const btn = document.getElementById(`fav-btn-${id}`);
        if (btn) {
          btn.innerHTML = '<i class="fa fa-star text-yellow-500"></i> 已收藏';
          btn.classList.add('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
        }
      });
      learned.forEach(id => {
        const card = document.querySelector(`[data-id="${id}"]`);
        if (card) {
          // 增加已学习标记
          const learnedTag = document.createElement('span');
          learnedTag.className = 'ml-2 px-2 py-0.5 bg-green-50 text-green-700 text-xs font-semibold rounded-full';
          learnedTag.innerText = '✅ 已学习';
          card.querySelector('h3').appendChild(learnedTag);
          // 卡片变浅，显示已学习
          card.classList.add('opacity-75');
        }
      });
    });

    // 渲染知识点列表
    function renderKnowledgeList(filteredList = null) {
      const list = filteredList || window.knowledgeList;
      const container = document.getElementById('knowledge-list');
      container.innerHTML = list.map(item => `
        <div class="knowledge-card bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-xl p-6 card-hover" data-id="${item.id}" data-tags="${item.tags.join(' ')}" data-title="${item.title.toLowerCase()}">
          <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 bg-purple-50 rounded-lg flex items-center justify-center text-2xl">${item.icon}</div>
            <button id="fav-btn-${item.id}" onclick="toggleFavorite('${item.id}')" class="px-3 py-1 border border-gray-200 rounded-lg text-sm font-medium hover:border-gray-300 transition-colors flex items-center gap-1">
              <i class="fa fa-star-o"></i> 收藏
            </button>
          </div>
          <h3 class="text-xl font-bold mb-2 flex items-center">${item.title}</h3>
          <p class="text-gray-600 mb-4 leading-relaxed">${item.description}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            ${item.tags.map(tag => `<span class="px-2.5 py-1 bg-purple-50 text-purple-700 text-xs font-semibold rounded-full">${tag}</span>`).join('')}
            <span class="px-2.5 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-full flex items-center gap-1">
              <i class="fa fa-clock-o"></i> ${item.duration}
            </span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-500">难度：${item.difficulty}</span>
            <a href="./learn.html?id=${item.id}" class="inline-flex items-center gap-2 text-purple-600 font-semibold hover:gap-3 transition-all">
              开始学习
              <i class="fa fa-arrow-right"></i>
            </a>
          </div>
        </div>
      `).join('');
    }

    // 筛选知识点
    function filterKnowledge(type, value) {
      let filtered = [...window.knowledgeList];
      
      if (type === 'search') {
        filtered = filtered.filter(item => 
          item.title.toLowerCase().includes(value) || 
          item.description.toLowerCase().includes(value) ||
          item.tags.some(tag => tag.toLowerCase().includes(value))
        );
      } else if (type === 'filter') {
        if (value === 'fav') {
          const favorites = JSON.parse(localStorage.getItem('cl_collection') || '[]');
          filtered = filtered.filter(item => favorites.includes(item.id));
        } else if (value === 'learned') {
          const learned = JSON.parse(localStorage.getItem('cl_learned') || '[]');
          filtered = filtered.filter(item => learned.includes(item.id));
        } else if (value === 'easy') {
          filtered = filtered.filter(item => item.difficulty === '入门级');
        } else if (value === 'advanced') {
          filtered = filtered.filter(item => item.difficulty === '进阶');
        }
      }

      renderKnowledgeList(filtered);
    }
  </script>
</body>
</html>
