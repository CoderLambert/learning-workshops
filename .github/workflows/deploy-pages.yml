name: 部署到GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # 支持手动触发部署

permissions:
  contents: read
  pages: write      # 允许写入GitHub Pages
  id-token: write   # 允许验证部署源

concurrency:
  group: "pages"
  cancel-in-progress: false # 不取消正在进行的部署

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传静态资源
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 上传整个仓库的所有静态文件

      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
