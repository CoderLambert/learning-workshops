<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜谱详情 - 家常菜学习工坊</title>

  <!-- SEO 基础 -->
  <meta name="description" content="超详细家常菜菜谱，精确用料、步骤详解、新手避坑指南，零基础也能一次成功">
  <meta name="keywords" content="家常菜,菜谱,家常菜谱,做菜教程,新手学做菜">
  <meta name="author" content="小秘书">
  <meta name="language" content="zh-CN">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://CoderLambert.github.io/learning-workshops/cooking-workshop/recipe-detail.html">

  <!-- Open Graph -->
  <meta property="og:title" content="菜谱详情 - 家常菜学习工坊">
  <meta property="og:description" content="超详细家常菜菜谱，精确用料、步骤详解、新手避坑指南，零基础也能一次成功">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://CoderLambert.github.io/learning-workshops/cooking-workshop/recipe-detail.html">
  <meta property="og:image" content="https://CoderLambert.github.io/learning-workshops/cooking-workshop/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#FF7D00">

  <!-- iOS Safari PWA 支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家常菜学习">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 样式 -->
  <link rel="stylesheet" href="./css/minimal.css">
  <style>
    .recipe-step {
      counter-increment: step;
      position: relative;
      padding-left: 50px;
    }
    .recipe-step::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0;
      width: 32px;
      height: 32px;
      background-color: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
    .ingredient-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .ingredient-item:last-child {
      border-bottom: none;
    }
    .tip-card {
      background-color: #fffbeb;
      border-left: 4px solid #f59e0b;
      padding: 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 导航 -->
    <nav class="nav">
      <a href="https://CoderLambert.github.io/learning-workshops/" class="nav-logo" style="margin-right: 8px; opacity: 0.8; transition: opacity 0.2s;" title="返回学习工坊首页">🏠</a><a href="./index.html" class="nav-logo">🍳 家常菜学习工坊</a>
      <ul class="nav-links">
        <li><a href="./learn.html" class="nav-link">开始学习</a></li>
        <li><a href="./flashcard.html" class="nav-link">闪卡复习</a></li>
        <li><a href="./roots.html" class="nav-link">知识点索引</a></li>
        <li><a href="./progress.html" class="nav-link">学习进度</a></li>
        <li><a href="./recipes.html" class="nav-link" style="color: var(--primary);">菜谱大全</a></li>
      </ul>
    </nav>

    <!-- 菜谱详情 -->
    <div id="recipe-detail" class="max-w-3xl mx-auto">
      <!-- 加载状态 -->
      <div class="text-center py-20">
        <i class="fa fa-spinner fa-spin text-3xl text-primary mb-4"></i>
        <p class="text-gray-600">正在加载菜谱详情...</p>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer mt-10">
      <div class="footer-tagline">新手也能轻松变大厨</div>
      <p class="footer-description">
        本网站收集整理了各种实用的家常菜做法和烹饪技巧，内容持续更新，希望帮助更多人学会做菜，享受做饭的乐趣。
      </p>
      <p>© 2026 家常菜学习工坊</p>
    </footer>
  </div>

  <!-- 脚本 -->
  <script src="./js/recipesData.js"></script>
  <script>
    // 从URL获取菜谱ID
    const urlParams = new URLSearchParams(window.location.search);
    const recipeId = parseInt(urlParams.get('id'));

    // 找到对应的菜谱
    const recipe = window.recipesData.find(r => r.id === recipeId);

    if (recipe) {
      // 渲染菜谱详情
      const detailHtml = `
        <!-- 返回按钮 -->
        <div class="mb-6">
          <a href="./recipes.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-primary transition-colors">
            <i class="fa fa-arrow-left"></i>
            返回菜谱列表
          </a>
        </div>

        <!-- 菜谱头部 -->
        <div class="text-center mb-8">
          <div class="text-6xl mb-4">${recipe.icon}</div>
          <h1 class="text-3xl font-bold mb-3">${recipe.name}</h1>
          <div class="flex flex-wrap justify-center gap-4 text-sm text-gray-600 mb-4">
            <span class="flex items-center gap-1"><i class="fa fa-star text-yellow-500"></i> 难度：${recipe.difficulty}</span>
            <span class="flex items-center gap-1"><i class="fa fa-clock-o text-blue-500"></i> 耗时：${recipe.time}</span>
            <span class="flex items-center gap-1"><i class="fa fa-users text-green-500"></i> 份量：${recipe.serving}</span>
          </div>
          <div class="flex flex-wrap justify-center gap-2 mb-4">
            ${recipe.tags.map(tag => `<span class="px-3 py-1 bg-primary/10 text-primary text-sm rounded-full">${tag}</span>`).join('')}
          </div>
        </div>

        <!-- 用料部分 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <i class="fa fa-shopping-basket text-primary"></i>
            用料表
          </h2>
          
          <div class="mb-6">
            <h3 class="text-lg font-semibold mb-3 text-gray-700">主料</h3>
            <div>
              ${recipe.ingredients.main.map(item => `
                <div class="ingredient-item">
                  <span>${item.name}</span>
                  <span class="text-gray-600 font-medium">${item.amount}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div>
            <h3 class="text-lg font-semibold mb-3 text-gray-700">调料</h3>
            <div>
              ${recipe.ingredients.seasoning.map(item => `
                <div class="ingredient-item">
                  <span>${item.name}</span>
                  <span class="text-gray-600 font-medium">${item.amount}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- 步骤部分 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <i class="fa fa-list-ol text-primary"></i>
            做法步骤
          </h2>
          <div class="space-y-6">
            ${recipe.steps.map((step, index) => `
              <div class="recipe-step">
                <p class="text-gray-800 leading-relaxed">${step}</p>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- 小贴士部分 -->
        <div class="tip-card mb-8">
          <h2 class="text-xl font-bold mb-3 flex items-center gap-2">
            <i class="fa fa-lightbulb-o text-yellow-600"></i>
            💡 新手小贴士
          </h2>
          <ul class="space-y-2">
            ${recipe.tips.map(tip => `
              <li class="text-gray-800 leading-relaxed">${tip}</li>
            `).join('')}
          </ul>
        </div>

        <!-- 底部操作 -->
        <div class="flex flex-wrap gap-4 justify-center">
          <button id="share-btn" class="btn btn-primary flex items-center gap-2">
            <i class="fa fa-share-alt"></i>
            分享菜谱
          </button>
          <button id="collect-btn" class="btn btn-outline flex items-center gap-2">
            <i class="fa fa-star-o"></i>
            收藏菜谱
          </button>
        </div>
      `;

      document.getElementById('recipe-detail').innerHTML = detailHtml;

      // 动态修改页面标题
      document.title = `${recipe.name} - 家常菜学习工坊`;

      // 分享功能
      document.getElementById('share-btn').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({
            title: `${recipe.name} 做法`,
            text: `我发现了一个超详细的${recipe.name}菜谱，零基础也能一次成功！`,
            url: window.location.href
          });
        } else {
          // 复制链接到剪贴板
          navigator.clipboard.writeText(window.location.href).then(() => {
            alert('菜谱链接已经复制到剪贴板，赶紧分享给朋友吧~');
          });
        }
      });

      // 收藏功能
      const collectBtn = document.getElementById('collect-btn');
      const collectedRecipes = JSON.parse(localStorage.getItem('ck_collection') || '[]');
      const isCollected = collectedRecipes.includes(recipeId);

      if (isCollected) {
        collectBtn.innerHTML = '<i class="fa fa-star text-yellow-500"></i> 已收藏';
        collectBtn.classList.add('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
      }

      collectBtn.addEventListener('click', () => {
        let collected = JSON.parse(localStorage.getItem('ck_collection') || '[]');
        if (collected.includes(recipeId)) {
          // 取消收藏
          collected = collected.filter(id => id !== recipeId);
          collectBtn.innerHTML = '<i class="fa fa-star-o"></i> 收藏菜谱';
          collectBtn.classList.remove('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
          alert('已取消收藏');
        } else {
          // 添加收藏
          collected.push(recipeId);
          collectBtn.innerHTML = '<i class="fa fa-star text-yellow-500"></i> 已收藏';
          collectBtn.classList.add('bg-yellow-50', 'text-yellow-700', 'border-yellow-300');
          alert('收藏成功，可以在我的收藏里查看哦~');
        }
        localStorage.setItem('ck_collection', JSON.stringify(collected));
      });
    } else {
      // 菜谱不存在
      document.getElementById('recipe-detail').innerHTML = `
        <div class="text-center py-20">
          <div class="text-6xl mb-4">😅</div>
          <h2 class="text-2xl font-bold mb-3">菜谱不存在</h2>
          <p class="text-gray-600 mb-6">你要找的菜谱可能已经被删除或者链接错误</p>
          <a href="./recipes.html" class="btn btn-primary">返回菜谱列表</a>
        </div>
      `;
    }
  </script>
</body>
</html>
