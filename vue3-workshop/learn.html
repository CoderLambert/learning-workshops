<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习 - Vue 3 学习工坊</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#42B883">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/minimal.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="./index.html" class="nav-logo"><span class="emoji">🌿</span> Vue 3 学习工坊</a>
      <ul class="nav-links">
        <li><a href="./learn.html" class="nav-link" style="color: var(--primary);">学习</a></li>
        <li><a href="./flashcard.html" class="nav-link">闪卡</a></li>
        <li><a href="./roots.html" class="nav-link">索引</a></li>
        <li><a href="./progress.html" class="nav-link">进度</a></li>
      </ul>
    </nav>

    <!-- 搜索 -->
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="搜索知识点...">
    </div>

    <!-- 分类筛选 -->
    <div class="flex flex-wrap justify-center gap-2 mb-8" id="filter-bar"></div>

    <!-- 知识点列表 -->
    <div class="roots-grid" id="topics-grid"></div>

    <footer class="footer">
      <a href="../" class="btn btn-secondary">← 返回学习工坊合集</a>
    </footer>
  </div>

  <script src="./js/siteConfig.js"></script>
  <script src="./js/wordData.js"></script>
  <script src="./js/storage.js"></script>
  <script>
    // 分类筛选
    const categories = [...new Set(wordData.words.map(w => w.category))]
    const filterBar = document.getElementById('filter-bar')
    
    // 全部按钮
    const allBtn = document.createElement('button')
    allBtn.className = 'btn btn-secondary filter-btn bg-primary/10'
    allBtn.textContent = '全部'
    allBtn.onclick = () => filterByCategory(null, allBtn)
    filterBar.appendChild(allBtn)

    categories.forEach(cat => {
      const btn = document.createElement('button')
      btn.className = 'btn btn-secondary filter-btn'
      btn.textContent = cat
      btn.onclick = () => filterByCategory(cat, btn)
      filterBar.appendChild(btn)
    })

    function filterByCategory(category, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-primary/10'))
      activeBtn.classList.add('bg-primary/10')
      renderTopics(wordData.words.filter(w => !category || w.category === category))
    }

    // 搜索
    document.getElementById('search-input').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase()
      const filtered = wordData.words.filter(w =>
        w.title.toLowerCase().includes(query) ||
        w.description.toLowerCase().includes(query) ||
        w.category.toLowerCase().includes(query)
      )
      renderTopics(filtered)
    })

    // 渲染知识点
    function renderTopics(words) {
      const grid = document.getElementById('topics-grid')
      grid.innerHTML = ''
      if (words.length === 0) {
        grid.innerHTML = '<p class="text-center text-gray-500" style="grid-column: 1/-1;">没有找到匹配的知识点</p>'
        return
      }
      words.forEach(word => {
        const learned = storageManager.getProgress()[word.id]?.learned
        const fav = storageManager.isFavorite(word.id)
        const diffColor = word.difficulty === '入门' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
        
        const card = document.createElement('div')
        card.className = 'root-card'
        card.style.cursor = 'pointer'
        card.style.position = 'relative'
        card.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-xl font-bold">${word.title}</h3>
            <div class="flex gap-2">
              <span class="text-xs px-2 py-1 rounded-full ${diffColor}">${word.difficulty}</span>
              ${learned ? '<span class="text-xs px-2 py-1 rounded-full bg-green-50 text-green-700">✅</span>' : ''}
            </div>
          </div>
          <p class="text-sm text-gray-500 mb-4">${word.category} · 约${word.estimatedMinutes}分钟</p>
          <p class="text-gray-600 mb-4">${word.description}</p>
          <div class="flex justify-between items-center">
            <a href="./root-detail.html?id=${word.id}" class="text-primary font-medium hover:underline">开始学习 →</a>
            <button class="btn btn-sm ${fav ? 'btn-primary' : 'btn-secondary'}" onclick="event.stopPropagation(); toggleFav(${word.id}, this)">${fav ? '★ 已收藏' : '☆ 收藏'}</button>
          </div>
        `
        card.onclick = () => { window.location.href = `./root-detail.html?id=${word.id}` }
        grid.appendChild(card)
      })
    }

    function toggleFav(id, btn) {
      storageManager.toggleFavorite(id)
      const isFav = storageManager.isFavorite(id)
      btn.className = 'btn btn-sm ' + (isFav ? 'btn-primary' : 'btn-secondary')
      btn.textContent = isFav ? '★ 已收藏' : '☆ 收藏'
    }

    renderTopics(wordData.words)
  </script>
</body>
</html>
