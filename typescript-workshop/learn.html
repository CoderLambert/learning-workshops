<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习 - TypeScript 学习工坊</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3178C6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TypeScript学习">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/minimal.css">
</head>
<body>
  <div class="container">
    <!-- 导航 -->
    <nav class="nav">
      <a href="./index.html" class="nav-logo">📘 TypeScript 学习工坊</a>
      <ul class="nav-links">
        <li><a href="./index.html" class="nav-link">首页</a></li>
        <li><a href="./learn.html" class="nav-link" style="color:var(--primary);">学习</a></li>
        <li><a href="./flashcard.html" class="nav-link">闪卡</a></li>
        <li><a href="./roots.html" class="nav-link">索引</a></li>
        <li><a href="./progress.html" class="nav-link">进度</a></li>
      </ul>
    </nav>

    <h1 class="text-3xl font-bold text-center mb-2">📚 TypeScript 知识点</h1>
    <p class="text-center text-gray-600 mb-8">17个核心知识点，系统学习 TypeScript 类型系统和最佳实践</p>

    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 搜索知识点...">
    </div>

    <div class="flex flex-wrap justify-center gap-2 mb-8" id="filter-bar"></div>
    <div class="roots-grid" id="knowledge-list"></div>

    <footer class="footer">
      <a href="../" class="btn btn-secondary">← 返回学习工坊合集</a>
    </footer>
  </div>

  <script src="./js/wordData.js"></script>
  <script src="./js/storage.js"></script>
  <script>
    const words = WordRoots || [];

    // 读取收藏和已学习状态
    const getFavorites = () => storageManager.getFavorites();
    const isLearned = (id) => !!storageManager.getProgress()[id]?.learned;

    // 筛选栏
    const filterBar = document.getElementById('filter-bar');
    const origins = [...new Set(words.map(w => w.origin))];

    const allBtn = document.createElement('button');
    allBtn.className = 'btn btn-secondary filter-btn bg-primary/10';
    allBtn.textContent = '全部';
    allBtn.onclick = () => { setActive(allBtn); renderList(words); };
    filterBar.appendChild(allBtn);

    origins.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-secondary filter-btn';
      btn.textContent = o;
      btn.onclick = () => { setActive(btn); renderList(words.filter(w => w.origin === o)); };
      filterBar.appendChild(btn);
    });

    function setActive(btn) {
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-primary/10'));
      btn.classList.add('bg-primary/10');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderList(words.filter(w =>
        w.root.toLowerCase().includes(q) ||
        w.description.toLowerCase().includes(q) ||
        w.origin.toLowerCase().includes(q)
      ));
    });

    function renderList(items) {
      const container = document.getElementById('knowledge-list');
      container.innerHTML = '';
      if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500" style="grid-column:1/-1;">没有找到匹配的知识点</p>';
        return;
      }
      items.forEach(word => {
        const learned = isLearned(word.id);
        const isFav = getFavorites().includes(word.id);
        const diffColor = ({'基础': 'bg-green-100 text-green-800', '进阶': 'bg-yellow-100 text-yellow-800', '高级': 'bg-red-100 text-red-800'})[word.difficulty] || 'bg-gray-100 text-gray-800';

        const card = document.createElement('div');
        card.className = 'root-card';
        card.style.cursor = 'pointer';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center text-2xl">📘</div>
            <button class="btn btn-sm ${isFav ? 'btn-primary' : 'btn-secondary'}" onclick="event.stopPropagation(); toggleFav(${word.id}, this)">${isFav ? '★ 已收藏' : '☆ 收藏'}</button>
          </div>
          <h3 class="text-xl font-bold mb-2">${word.root}${learned ? ' <span style="font-size:14px;">✅</span>' : ''}</h3>
          <p class="text-gray-600 mb-4">${word.description}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700">${word.origin}</span>
            <span class="text-xs px-2 py-1 rounded-full ${diffColor}">${word.difficulty}</span>
            <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600">⏱ ${word.duration}</span>
          </div>
          <div class="flex justify-between items-center">
            <a href="./root-detail.html?id=${word.id}" class="text-primary font-medium hover:underline">开始学习 →</a>
          </div>
        `;
        card.onclick = () => { window.location.href = `./root-detail.html?id=${word.id}` };
        container.appendChild(card);
      });
    }

    function toggleFav(id, btn) {
      const favs = storageManager.toggleFavorite(id);
      const isFav = favs.includes(id);
      btn.className = 'btn btn-sm ' + (isFav ? 'btn-primary' : 'btn-secondary');
      btn.textContent = isFav ? '★ 已收藏' : '☆ 收藏';
    }

    renderList(words);
  </script>
</body>
</html>
