<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习 - TypeScript 学习工坊</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3178C6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TypeScript学习">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/minimal.css">
</head>
<body>
  <div class="container">
    <!-- 导航 -->
    <nav class="nav">
      <div>
        <a href="../" class="nav-logo" style="margin-right:8px;opacity:0.8;">🏠</a>
        <a href="./index.html" class="nav-logo">📘 TypeScript 学习工坊</a>
      </div>
      <ul class="nav-links">
        <li><a href="./index.html" class="nav-link">首页</a></li>
        <li><a href="./learn.html" class="nav-link" style="color:var(--primary);">学习</a></li>
        <li><a href="./flashcard.html" class="nav-link">闪卡</a></li>
        <li><a href="./progress.html" class="nav-link">进度</a></li>
      </ul>
    </nav>

    <!-- 页面标题 -->
    <h1 class="text-3xl font-bold text-center mb-2">📚 TypeScript 知识点</h1>
    <p class="text-center text-gray-600 mb-8">17个核心知识点，系统学习 TypeScript 类型系统和最佳实践</p>

    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 搜索知识点...">
    </div>

    <!-- 筛选栏 -->
    <div class="flex flex-wrap justify-center gap-2 mb-8" id="filter-bar"></div>

    <!-- 知识点列表 -->
    <div class="roots-grid" id="knowledge-list"></div>

    <footer class="footer">
      <a href="../" class="btn btn-secondary">← 返回学习工坊合集</a>
    </footer>
  </div>

  <script src="./js/siteConfig.js"></script>
  <script src="./js/wordData.js"></script>
  <script src="./js/storage.js"></script>
  <script>
    const words = wordData.words || [];
    const progress = storageManager.getProgress();
    const favorites = storageManager.getFavorites();

    // 筛选栏
    const filterBar = document.getElementById('filter-bar');
    const categories = [...new Set(words.map(w => w.category || '全部'))];

    const allBtn = document.createElement('button');
    allBtn.className = 'btn btn-secondary filter-btn bg-primary/10';
    allBtn.textContent = '全部 (' + words.length + ')';
    allBtn.onclick = () => filterByCategory(null, allBtn);
    filterBar.appendChild(allBtn);

    categories.forEach(cat => {
      const count = words.filter(w => (w.category || '全部') === cat).length;
      const btn = document.createElement('button');
      btn.className = 'btn btn-secondary filter-btn';
      btn.textContent = cat + ' (' + count + ')';
      btn.onclick = () => filterByCategory(cat, btn);
      filterBar.appendChild(btn);
    });

    const favBtn = document.createElement('button');
    favBtn.className = 'btn btn-secondary filter-btn';
    favBtn.textContent = '⭐ 收藏 (' + favorites.length + ')';
    favBtn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-primary/10'));
      favBtn.classList.add('bg-primary/10');
      renderList(words.filter(w => storageManager.isFavorite(w.id)));
    };
    filterBar.appendChild(favBtn);

    function filterByCategory(category, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-primary/10'));
      activeBtn.classList.add('bg-primary/10');
      renderList(words.filter(w => !category || (w.category || '全部') === category));
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderList(words.filter(w =>
        (w.title || w.root || '').toLowerCase().includes(q) ||
        (w.description || '').toLowerCase().includes(q) ||
        (w.category || '').toLowerCase().includes(q)
      ));
    });

    function renderList(items) {
      const container = document.getElementById('knowledge-list');
      container.innerHTML = '';
      if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500" style="grid-column:1/-1;">没有找到匹配的知识点</p>';
        return;
      }
      items.forEach(word => {
        const title = word.title || word.root || '未命名';
        const desc = word.description || '';
        const tags = word.tags || word.origin ? [word.origin].filter(Boolean) : [];
        const diff = word.difficulty || '';
        const diffColor = (diff === '入门级' || diff === '入门') ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';
        const learned = storageManager.getProgress()[word.id]?.learned;
        const fav = storageManager.isFavorite(word.id);

        const card = document.createElement('div');
        card.className = 'root-card';
        card.style.cursor = 'pointer';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center text-2xl">📘</div>
            <button class="btn btn-sm ${fav ? 'btn-primary' : 'btn-secondary'}" onclick="event.stopPropagation(); toggleFav(${word.id}, this)">${fav ? '★ 已收藏' : '☆ 收藏'}</button>
          </div>
          <h3 class="text-xl font-bold mb-2">${title}${learned ? ' <span style="font-size:14px;">✅</span>' : ''}</h3>
          <p class="text-gray-600 mb-4">${desc}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            ${tags.map(t => `<span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700">${t}</span>`).join('')}
            ${diff ? `<span class="text-xs px-2 py-1 rounded-full ${diffColor}">${diff}</span>` : ''}
          </div>
          <div class="flex justify-between items-center">
            <a href="./root-detail.html?id=${word.id}" class="text-primary font-medium hover:underline">开始学习 →</a>
          </div>
        `;
        card.onclick = () => { window.location.href = `./root-detail.html?id=${word.id}` };
        container.appendChild(card);
      });
    }

    function toggleFav(id, btn) {
      storageManager.toggleFavorite(id);
      const isFav = storageManager.isFavorite(id);
      btn.className = 'btn btn-sm ' + (isFav ? 'btn-primary' : 'btn-secondary');
      btn.textContent = isFav ? '★ 已收藏' : '☆ 收藏';
    }

    renderList(words);
  </script>
</body>
</html>
